name: container

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Compute version args
        id: ver
        run: |
          {
            echo "year=$(date +%y)"
            echo "month=$(date +%m)"
            echo "commit=$(git rev-parse --short HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            version_year=${{ steps.ver.outputs.year }}
            version_month=${{ steps.ver.outputs.month }}
            version_release=0
            version_patch=0
            version_pre=dev
            version_branch=${{ github.ref_name }}
            version_commit=${{ steps.ver.outputs.commit }}
            source_url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}

  cleanup:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete previous untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: swoptape
          delete-untagged: true
